<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solicitações de Compra</title>
    <!-- Importa o arquivo de estilos -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Cabeçalho da página -->
      <header>
        <h1>Sistema de Solicitações de Compra</h1>
        <p>Preencha o formulário para registrar uma nova solicitação</p>
      </header>

      <!-- Formulário de solicitação -->
      <section class="form-section">
        <h2>Nova Solicitação</h2>

        <form id="purchaseForm">
          <!-- Campo: Nome do solicitante -->
          <div class="form-group">
            <label for="requesterName">Nome do Solicitante</label>
            <input
              type="text"
              id="requesterName"
              placeholder="Digite seu nome completo"
            />
          </div>

          <!-- Campo: Produto -->
          <div class="form-group">
            <label for="product">Produto</label>
            <input
              type="text"
              id="product"
              placeholder="Digite o nome do produto"
            />
          </div>

          <!-- Campo: Valor -->
          <div class="form-group">
            <label for="value">Valor da Compra (R$)</label>
            <input
              type="number"
              id="value"
              placeholder="0,00"
              min="0"
              step="0.01"
            />
          </div>

          <!-- Mensagem de erro (aparece só quando há erro) -->
          <div id="errorMessage" class="error-message hidden"></div>

          <!-- Botão de envio -->
          <button type="submit">Enviar Solicitação</button>
        </form>
      </section>

      <!-- Lista de solicitações enviadas -->
      <section class="requests-section hidden" id="requestsSection">
        <h2>Solicitações Registradas</h2>
        <div id="requestsList"></div>
      </section>
    </div>

    <!-- Importa o arquivo de lógica -->
    <script src="script.js"></script>
  </body>
</html>
